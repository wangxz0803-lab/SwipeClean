name: swipe_clean
description: "Tinder-style photo cleaner - swipe to organize your gallery"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  photo_manager: ^3.6.0
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  crypto: ^3.0.6
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
